<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2>Editar cinema</h2>
                <div class="breadcrumb">
                    <a th:href="@{/cinemes}">Cinemes</a> /
                    <a th:href="@{/cinema/{id}(id=${cinema.id})}" th:text="${cinema.cinemaName}"></a> /
                    Editar
                </div>
            </div>
            <a th:href="@{/cinema/{id}(id=${cinema.id})}" class="btn btn-ghost">Cancel·lar</a>
        </div>

        <div class="form-page">
            <div class="form-card">
                <form th:action="@{/cinema/update}" th:object="${cinema}" method="post" novalidate>
                    <input type="hidden" th:field="*{id}">

                    <div class="form-field">
                        <label for="cinemaName">Nom del cinema *</label>
                        <input type="text" th:field="*{cinemaName}" id="cinemaName"
                               required minlength="2" maxlength="100">
                        <div th:if="${#fields.hasErrors('cinemaName')}" th:errors="*{cinemaName}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="city">Ciutat *</label>
                        <input type="text" th:field="*{city}" id="city"
                               required minlength="2" maxlength="100">
                        <div th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="address">Adreça *</label>
                        <input type="text" th:field="*{address}" id="address"
                               required minlength="5" maxlength="200">
                        <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="postalCode">Codi postal *</label>
                        <input type="number" th:field="*{postalCode}" id="postalCode"
                               required min="10000" max="99999">
                        <div th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}" class="form-error"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Desar canvis</button>
                        <a th:href="@{/cinemes}" class="btn btn-ghost">Cancel·lar</a>
                    </div>
                </form>
            </div>
        </div>

    </div>

</div>

</body>
</html>
