<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2>Editar seient</h2>
                <div class="breadcrumb">
                    <a th:if="${seat.room != null}" th:href="@{/seat/{id}(id=${seat.room.id})}">Seients</a> /
                    <span th:text="|${seat.seatRow}${seat.number}|"></span>
                </div>
            </div>
            <a th:if="${seat.room != null}" th:href="@{/seat/{id}(id=${seat.room.id})}" class="btn btn-ghost">Cancel·lar</a>
        </div>

        <div class="form-page">
            <div class="form-card">
                <form th:action="@{/seats/update/{id}(id=${seat.id})}" th:object="${seat}" method="post" novalidate>

                    <div class="form-field">
                        <label for="seatRow">Fila *</label>
                        <input type="text" id="seatRow" th:field="*{seatRow}"
                               required minlength="1" maxlength="5" pattern="[A-Za-z0-9]{1,5}"/>
                        <div th:if="${#fields.hasErrors('seatRow')}" th:errors="*{seatRow}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="number">Número *</label>
                        <input type="number" id="number" th:field="*{number}"
                               required min="1" max="999"/>
                        <div th:if="${#fields.hasErrors('number')}" th:errors="*{number}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="x">Coordenada X (0-79) *</label>
                        <input type="number" id="x" th:field="*{x}" required min="0" max="79"/>
                        <div th:if="${#fields.hasErrors('x')}" th:errors="*{x}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="y">Coordenada Y (0-59) *</label>
                        <input type="number" id="y" th:field="*{y}" required min="0" max="59"/>
                        <div th:if="${#fields.hasErrors('y')}" th:errors="*{y}" class="form-error"></div>
                    </div>

                    <div class="form-field inline">
                        <input type="checkbox" id="state" th:field="*{state}"/>
                        <label for="state">Seient disponible (actiu)</label>
                    </div>

                    <div class="form-field">
                        <label for="typeSeat">Tipus de seient *</label>
                        <select id="typeSeat" th:field="*{typeSeat}" required>
                            <option value="">-- Selecciona un tipus --</option>
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('typeSeat')}" th:errors="*{typeSeat}" class="form-error"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Desar canvis</button>
                        <a th:if="${seat.room != null}" th:href="@{/seat/{id}(id=${seat.room.id})}" class="btn btn-ghost">Cancel·lar</a>
                    </div>
                </form>

                <hr style="margin-top:24px"/>

                <form th:action="@{/seats/delete/{id}(id=${seat.id})}" method="post"
                      onsubmit="return confirm('Segur que vols eliminar aquest seient? Aquesta acció no es pot desfer.');">
                    <button type="submit" class="btn btn-danger">Eliminar seient</button>
                </form>
            </div>
        </div>

    </div>

</div>

</body>
</html>
