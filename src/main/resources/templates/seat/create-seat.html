<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Asiento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="form-page">
        <div class="form-card">
            <h1>Crear Asiento</h1>

            <form method="post" th:action="@{/seats/create/{roomId}(roomId=${roomId})}" th:object="${seat}">
                <div class="form-field">
                    <label for="seatRow">Fila:</label>
                    <input type="text" id="seatRow" th:field="*{seatRow}" required/>
                </div>

                <div class="form-field">
                    <label for="number">Número:</label>
                    <input type="number" id="number" th:field="*{number}" required/>
                </div>

                <div class="form-field">
                    <label for="x">X:</label>
                    <input type="number" id="x" th:field="*{x}" required/>
                </div>

                <div class="form-field">
                    <label for="y">Y:</label>
                    <input type="number" id="y" th:field="*{y}" required/>
                </div>

                <div class="form-field inline">
                    <label for="state">Disponible:</label>
                    <input type="checkbox" id="state" th:field="*{state}"/>
                </div>

                <div class="form-field">
                    <label for="typeSeat">Tipo:</label>
                    <select id="typeSeat" th:field="*{typeSeat}" required>
                        <option value="">Selecciona un tipo </option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit">Crear Asiento</button>
                    <a th:href="@{/seats/{roomId}(roomId=${roomId})}">Volver</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
