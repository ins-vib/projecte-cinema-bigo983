<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cinema</title>
</head>
<body>
        <form th:action="@{/cinema/update}" th:object="${cinema}" method="post">
        <input type="text" th:field="*{id}" id="id" hidden >
        <label for="cinemaName">Nom del cinema:</label>
        <input type="text" th:field="*{cinemaName}" id="cinemaName" placeholder="Nom del cinema" required>
        <br>
        <br>
        <label for="city">Ciutat:</label>
        <input type="text" th:field="*{city}" id="city" placeholder="Ciutat" required>
        <br>
        <br>
        <label for="address">Adreça:</label>
        <input type="text" th:field="*{address}" id="address" placeholder="Adreça" required>
        <br>
        <br>
        <label for="postalCode">Codi Postal:</label>
        <input type="text" th:field="*{postalCode}" id="postalCode" placeholder="Codi Postal" required>
        <br>
        <br>
        <button type="submit">Guardar</button>
    </form>
</body>
</html>
