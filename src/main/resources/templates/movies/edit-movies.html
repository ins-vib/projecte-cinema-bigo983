<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form th:action="@{/movies/update}" th:object="${movie}" method="post">
        <input type="hidden" th:field="*{id}" id="id">
        <label for="title">Movie title:</label>
        <input type="text" th:field="*{title}" id="title" placeholder="Movie title" required>
        <br>
        <br>
        <label for="duration">Duration (minutes):</label>
        <input type="number" th:field="*{duration}" id="duration" placeholder="Duration in minutes" required>
        <br>
        <br>
        <label for="genre">Genre:</label>
        <input type="text" th:field="*{genre}" id="genre" placeholder="Genre" required>
        <br>
        <br>
        <label for="description">Description:</label>
        <input type="text" th:field="*{description}" id="description" placeholder="Description" required>
        <br>
        <br>
        <label for="releaseDate">Release date:</label>
        <input type="date" th:field="*{releaseDate}" id="releaseDate" required>
        <br>
        <br>
        <button type="submit">Save</button>
    </form>
</body>
</html>
