<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2>Cartellera</h2>
                <div class="breadcrumb">
                    <span th:if="${isAdmin}">Gestió</span>
                    <span th:if="${isClient}">Pel·lícules en cartell</span>
                </div>
            </div>
            <a th:if="${isAdmin}" th:href="@{/movies/create-movies}" class="btn btn-primary">+ Nova pel·lícula</a>
        </div>

        <div th:if="${#lists.isEmpty(movies)}" class="empty-state">
            Encara no hi ha pel·lícules a la cartellera.
        </div>

        <div th:unless="${#lists.isEmpty(movies)}" class="card-grid">
            <div th:each="movie : ${movies}" class="movie-card">
                <div class="movie-poster">🎞️</div>
                <div class="movie-body">
                    <h3 th:text="${movie.title}"></h3>
                    <div class="movie-meta">
                        <span class="badge badge-accent" th:text="${movie.genre}"></span>
                        <span class="badge badge-muted" th:text="|${movie.duration} min|"></span>
                    </div>
                    <p class="movie-desc" th:text="${movie.description}"></p>
                    <div class="movie-meta">
                        📅 <span th:text="${#temporals.format(movie.releaseDate, 'dd/MM/yyyy')}"></span>
                    </div>
                    <div class="card-actions">
                        <a class="action-link view" th:href="@{/movies/detail/{id}(id=${movie.id})}">Detalls</a>
                        <a class="action-link primary" th:href="@{/movies/projections/{id}(id=${movie.id})}">Projeccions</a>
                        <a th:if="${isAdmin}" class="action-link edit" th:href="@{/movies/update/{id}(id=${movie.id})}">Editar</a>
                        <form th:if="${isAdmin}" class="inline-form" th:action="@{/movies/delete/{id}(id=${movie.id})}" method="post"
                              th:attr="onsubmit=|return confirm('Segur que vols eliminar la pel·lícula ${movie.title}? Totes les seves projeccions també s\\'eliminaran.');|">
                            <button type="submit" class="action-link delete">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
