<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login | CinemaDaw</title>
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <h1>Inicia sessió</h1>
            <p class="dashboard-subtitle">Accedeix amb el teu usuari i contrasenya.</p>

            <div class="login-alert error" th:if="${param.error}">
                Usuari o contrasenya incorrectes.
            </div>
            <div class="login-alert success" th:if="${param.logout}">
                Sessió tancada correctament.
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <label for="username">Usuari</label>
                <input id="username" type="text" name="username" required/>

                <label for="password">Contrasenya</label>
                <input id="password" type="password" name="password" required/>

                <button class="btn btn-primary" type="submit">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
