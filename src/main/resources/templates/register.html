<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Registrar-se | CinemaDaw</title>
</head>
<body>
    <main class="register-page">
        <section class="login-card">
            <h1>🎬 Registra't</h1>
            <p class="dashboard-subtitle">Crea un nou compte per accedir a CinemaDaw.</p>

            <div class="alert alert-error" th:if="${registerError}" th:text="${registerError}"></div>

            <form th:action="@{/register}" method="post" class="login-form" novalidate>
                <label for="username">Usuari</label>
                <input id="username" type="text" name="username" required minlength="3" maxlength="50"
                       placeholder="Escull un nom d'usuari"/>

                <label for="password">Contrasenya</label>
                <input id="password" type="password" name="password" required minlength="4" maxlength="100"
                       placeholder="Contrasenya segura"/>

                <button class="btn btn-primary" type="submit">Registra't</button>
            </form>

            <p class="dashboard-subtitle" style="margin-top:16px">
                Ja tens compte?
                <a th:href="@{/login}">Inicia sessió</a>
            </p>
            <p class="dashboard-subtitle" style="text-align:center">
                <a th:href="@{/home}">← Tornar a la portada</a>
            </p>
        </section>
    </main>
</body>
</html>
