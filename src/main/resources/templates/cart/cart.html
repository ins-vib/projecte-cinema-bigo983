<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2>🛒 El meu carret</h2>
                <div class="breadcrumb">
                    Hola, <strong th:text="${username}"></strong>
                </div>
            </div>
            <a th:href="@{/movies/movies}" class="btn btn-ghost">Continuar mirant</a>
        </div>

        <div th:if="${purchaseMessage}" class="alert alert-info" th:text="${purchaseMessage}"></div>

        <div th:unless="${hasItems}" class="empty-state">
            No tens seients al carret.
            <div style="margin-top:14px">
                <a th:href="@{/movies/movies}" class="btn btn-primary">Anar a cartellera</a>
            </div>
        </div>

        <div th:if="${hasItems}">
            <table>
                <thead>
                    <tr>
                        <th>Pel·lícula</th>
                        <th>Data</th>
                        <th>Cinema</th>
                        <th>Sala</th>
                        <th>Seient</th>
                        <th>Preu</th>
                        <th>Accions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="seat : ${screening.room.seats}" th:if="${selectedSeatIds.contains(seat.id)}">
                        <td><strong th:text="${screening.movie.title}"></strong></td>
                        <td th:text="${#temporals.format(screening.dateTime, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${screening.room.cinema.cinemaName}"></td>
                        <td th:text="${screening.room.name}"></td>
                        <td>
                            <span class="badge badge-accent" th:text="|${seat.seatRow}${seat.number}|"></span>
                        </td>
                        <td th:text="|${#numbers.formatDecimal(screening.price, 1, 2)} €|"></td>
                        <td class="actions-cell">
                            <form th:action="@{/cart/remove}" method="post" class="inline-form"
                                  onsubmit="return confirm('Vols treure aquest seient del carret?');">
                                <input type="hidden" name="seatId" th:value="${seat.id}">
                                <button type="submit" class="action-link delete">Treure</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="detail-grid" style="margin-top:20px">
                <div class="detail-item">
                    <span class="detail-label">Total entrades</span>
                    <span class="detail-value" th:text="${quantity}"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Total a pagar</span>
                    <span class="detail-value">
                        <span class="badge badge-success" th:text="|${#numbers.formatDecimal(totalPrice, 1, 2)} €|"></span>
                    </span>
                </div>
            </div>

            <form th:action="@{/cart/checkout}" method="post" style="margin-top:20px"
                  onsubmit="return confirm('Confirmes la compra?');">
                <button type="submit" class="btn btn-primary">Finalitzar compra</button>
            </form>
        </div>
    </div>
</div>
</body>

</html>
