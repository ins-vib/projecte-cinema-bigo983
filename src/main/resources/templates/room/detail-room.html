<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Capacity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td th:text="${room.name}"></td>
                <td th:text="${room.capacity}"></td>    
            </tr>
        </tbody>
        </table>

    </div>

</div>

</body>
</html>
