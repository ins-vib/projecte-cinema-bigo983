<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <form th:action="@{/room/update}" th:object="${room}" method="post">
        <input type="hidden" th:field="*{id}" id="id">
        <input type="hidden" th:field="*{cinema.id}" id="cinemaId">
        <label for="name">Room name:</label>
        <input type="text" th:field="*{name}" id="name" placeholder="Room name" >
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></div>
        <br>
        <br>
        <label for="capacity">Capacity:</label>
        <input type="number" th:field="*{capacity}" id="capacity" placeholder="Capacity" >
        <div th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}" class="error"></div>
        <br>
        <br>
        <button type="submit">Save</button>
        </form>

    </div>

</div>

</body>
</html>
