<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2 th:text="${movie != null} ? |Projeccions: ${movie.title}| : 'Projeccions'"></h2>
                <div class="breadcrumb">
                    <a th:href="@{/movies/movies}">Pel·lícules</a> /
                    <a th:if="${movie != null}" th:href="@{/movies/detail/{id}(id=${movie.id})}" th:text="${movie.title}"></a> / Projeccions
                </div>
            </div>
            <div>
                <a th:if="${isAdmin}" th:href="@{/screenings/new(movieId=${movieId})}" class="btn btn-primary">+ Nova projecció</a>
                <a th:href="@{/movies/movies}" class="btn btn-ghost">Tornar</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(screenings)}" class="empty-state">
            Aquesta pel·lícula encara no té projeccions programades.
        </div>

        <table th:unless="${#lists.isEmpty(screenings)}">
            <thead>
                <tr>
                    <th>Pel·lícula</th>
                    <th>Data i hora</th>
                    <th>Sala</th>
                    <th>Cinema</th>
                    <th>Preu</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="screening : ${screenings}">
                    <td><strong th:text="${screening.movie.title}"></strong></td>
                    <td th:text="${#temporals.format(screening.dateTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${screening.room != null} ? ${screening.room.name} : '-'"></td>
                    <td th:text="${screening.room != null and screening.room.cinema != null} ? ${screening.room.cinema.cinemaName} : '-'"></td>
                    <td>
                        <span class="badge badge-success" th:text="|${#numbers.formatDecimal(screening.price, 1, 2)} €|"></span>
                    </td>
                    <td class="actions-cell">
                        <a class="action-link view" th:href="@{/screenings/{id}(id=${screening.id})}">Detall</a>
                        <a class="action-link primary" th:href="@{/screenings/reserve/{id}(id=${screening.id})}"
                           th:text="${isAdmin} ? 'Mapa de seients' : 'Reservar'">Reservar</a>
                        <a th:if="${isAdmin}" class="action-link edit" th:href="@{/screenings/edit/{id}(id=${screening.id})}">Editar</a>
                        <form th:if="${isAdmin}" class="inline-form" th:action="@{/screenings/delete/{id}(id=${screening.id})}" method="post"
                              onsubmit="return confirm('Segur que vols eliminar aquesta projecció? Aquesta acció no es pot desfer.');">
                            <button type="submit" class="action-link delete">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
