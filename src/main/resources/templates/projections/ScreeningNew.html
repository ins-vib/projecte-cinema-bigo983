<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2>Nova projecció</h2>
                <div class="breadcrumb">
                    <a th:href="@{/movies/movies}">Pel·lícules</a> /
                    <a th:href="@{/movies/projections/{id}(id=${screening.movie.id})}" th:text="${screening.movie.title}"></a> /
                    Nova projecció
                </div>
            </div>
            <a th:href="@{/movies/projections/{id}(id=${screening.movie.id})}" class="btn btn-ghost">Cancel·lar</a>
        </div>

        <div class="form-page">
            <div class="form-card">
                <form th:action="@{/screenings/new}" method="post" th:object="${screening}" novalidate>
                    <input type="hidden" th:field="*{movie.id}"/>

                    <div class="form-field">
                        <label for="dateTime">Data i hora *</label>
                        <input type="datetime-local" id="dateTime" th:field="*{dateTime}" required/>
                        <div th:if="${#fields.hasErrors('dateTime')}" th:errors="*{dateTime}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="room">Sala *</label>
                        <select id="room" th:field="*{room.id}" required>
                            <option value="">-- Selecciona una sala --</option>
                            <option th:each="r : ${rooms}" th:value="${r.id}"
                                    th:text="|${r.name} · ${r.cinema != null ? r.cinema.cinemaName : ''} (${r.capacity} butaques)|"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('room')}" th:errors="*{room}" class="form-error"></div>
                    </div>

                    <div class="form-field">
                        <label for="price">Preu (€) *</label>
                        <input type="number" step="0.05" id="price" th:field="*{price}"
                               placeholder="8.50" required min="0.50" max="100.00"/>
                        <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="form-error"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Crear projecció</button>
                        <a th:href="@{/movies/movies}" class="btn btn-ghost">Cancel·lar</a>
                    </div>
                </form>
            </div>
        </div>

    </div>

</div>

</body>
</html>
