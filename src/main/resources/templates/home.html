<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <section>
            <h2>Live the magic of cinema</h2>
            <p>The best premieres, the best experience</p>
        </section>
        <section>
            <h2>Latest News</h2>
            <ul>
                <li th:each="news : ${newsList}" th:text="${news}"></li>
            </ul>
        </section>

    </div>

</div>

</body>
</html>
