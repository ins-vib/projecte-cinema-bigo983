<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h2>Les meves entrades</h2>
                <div class="breadcrumb">Historial de compres</div>
            </div>
            <a th:href="@{/movies/movies}" class="btn btn-ghost">Veure cartellera</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div th:if="${#maps.isEmpty(ticketsByOrder)}" class="empty-state">
            Encara no tens entrades comprades.
        </div>

        <div class="orders-wrapper" th:unless="${#maps.isEmpty(ticketsByOrder)}">
            <section class="order-card" th:each="orderEntry : ${ticketsByOrder}">
                <h3 th:text="|Comanda #${orderEntry.key}|"></h3>
                <p class="order-meta"
                   th:text="${orderEntry.value[0].comanda.createdAt != null
                        ? 'Data de compra: ' + #temporals.format(orderEntry.value[0].comanda.createdAt, 'dd/MM/yyyy HH:mm')
                        : 'Data de compra: -'}"></p>
                <p class="order-meta" th:text="|Entrades en aquesta compra: ${#lists.size(orderEntry.value)}|"></p>

                <table>
                    <thead>
                        <tr>
                            <th>Pel·lícula</th>
                            <th>Data projecció</th>
                            <th>Sala</th>
                            <th>Cinema</th>
                            <th>Seient</th>
                            <th>Preu</th>
                            <th>Estat</th>
                            <th>Acció</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ticket : ${orderEntry.value}">
                            <td><strong th:text="${ticket.screening.movie.title}"></strong></td>
                            <td th:text="${#temporals.format(ticket.screening.dateTime, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${ticket.screening.room.name}"></td>
                            <td th:text="${ticket.screening.room.cinema.cinemaName}"></td>
                            <td>
                                <span class="badge badge-accent" th:text="|${ticket.seat.seatRow}${ticket.seat.number}|"></span>
                            </td>
                            <td>
                                <span class="badge badge-success" th:text="|${#numbers.formatDecimal(ticket.price, 1, 2)} €|"></span>
                            </td>
                            <td>
                                <span th:if="${ticket.status.name() == 'ACTIVE'}" class="badge badge-success">Activa</span>
                                <span th:if="${ticket.status.name() == 'RETURN_REQUESTED'}" class="badge badge-warning">Pendent de cancel·lació</span>
                                <span th:if="${ticket.status.name() == 'CANCELLED'}" class="badge badge-muted">Cancel·lada</span>
                            </td>
                            <td>
                                <form th:if="${ticket.status.name() == 'ACTIVE'}"
                                      th:action="@{/tickets/{id}/return(id=${ticket.id})}" method="post"
                                      onsubmit="return confirm('Segur que vols sol·licitar la devolució d\'aquesta entrada? La decisió final la prendrà l\'administrador.');">
                                    <button type="submit" class="action-link delete">Demanar devolució</button>
                                </form>
                                <span th:if="${ticket.status.name() == 'RETURN_REQUESTED'}" style="color:#f59e0b; font-size:0.82rem;">En revisió</span>
                                <span th:if="${ticket.status.name() == 'CANCELLED'}" style="color:#6b7280; font-size:0.82rem;">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>
</div>
</body>

</html>
